name: CI-CD

on:
  push:
    branches:
      - main

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t triotechltd/myapp:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push triotechltd/myapp:${{ github.sha }}

      - name: Update Helm Tag
        run: |
          sed -i "s/tag:.*/tag: ${{ github.sha }}/g" helm/myapp/values.yaml

      - name: Commit Changes
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          git add .

          git diff --cached --quiet || git commit -m "update image tag"

          git push
